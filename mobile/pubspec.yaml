name: munkhzaisan_mobile
description: MunkhZaisan employee mobile application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  google_sign_in: ^6.2.2

  # HTTP for cloud functions
  http: ^1.2.2

  # Navigation
  go_router: ^14.6.2

  # State management
  provider: ^6.1.2

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

